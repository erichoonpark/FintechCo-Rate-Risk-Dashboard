name: Claude PR Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-review:
    name: Run Claude code + security review
    runs-on: ubuntu-latest

    if: >-
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@claude review') &&
      github.event.comment.user.type != 'Bot'

    steps:
      - name: Post acknowledgement comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          gh api \
            --method POST \
            "repos/${REPO}/issues/${ISSUE}/comments" \
            --field body="🤖 **Claude review in progress...** I'll post results shortly."

      - name: Fetch PR metadata
        id: pr_meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.issue.number }}
        run: |
          PR_JSON=$(gh api "repos/${REPO}/pulls/${PR_NUM}")

          PR_TITLE=$(echo "$PR_JSON" | jq -r '.title // ""')
          PR_URL=$(echo "$PR_JSON" | jq -r '.html_url // ""')
          BASE_REF=$(echo "$PR_JSON" | jq -r '.base.ref // ""')
          HEAD_REF=$(echo "$PR_JSON" | jq -r '.head.ref // ""')
          AUTHOR=$(echo "$PR_JSON" | jq -r '.user.login // ""')
          PR_BODY=$(echo "$PR_JSON" | jq -r '.body // ""')

          {
            echo "pr_title<<EOF"
            printf '%s\n' "$PR_TITLE"
            echo "EOF"
            echo "pr_url<<EOF"
            printf '%s\n' "$PR_URL"
            echo "EOF"
            echo "base_ref<<EOF"
            printf '%s\n' "$BASE_REF"
            echo "EOF"
            echo "head_ref<<EOF"
            printf '%s\n' "$HEAD_REF"
            echo "EOF"
            echo "author<<EOF"
            printf '%s\n' "$AUTHOR"
            echo "EOF"
            echo "pr_body<<EOF"
            printf '%s\n' "$PR_BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Fetch PR diff
        id: pr_diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.issue.number }}
        run: |
          gh api \
            --header "Accept: application/vnd.github.diff" \
            "repos/${REPO}/pulls/${PR_NUM}" > /tmp/pr.diff.full

          head -c 60000 /tmp/pr.diff.full > /tmp/pr.diff

          ORIG_LEN=$(wc -c < /tmp/pr.diff.full)
          TRUNC_LEN=$(wc -c < /tmp/pr.diff)

          if [ "$ORIG_LEN" -gt "$TRUNC_LEN" ]; then
            printf '\n\n[diff truncated at 60,000 bytes — %s bytes in full diff]\n' \
              "$ORIG_LEN" >> /tmp/pr.diff
          fi

          echo "diff_len=${TRUNC_LEN}" >> "$GITHUB_OUTPUT"

      - name: Call Claude API and capture review
        id: claude_review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE: ${{ steps.pr_meta.outputs.pr_title }}
          PR_URL: ${{ steps.pr_meta.outputs.pr_url }}
          BASE_REF: ${{ steps.pr_meta.outputs.base_ref }}
          HEAD_REF: ${{ steps.pr_meta.outputs.head_ref }}
          PR_AUTHOR: ${{ steps.pr_meta.outputs.author }}
          PR_BODY: ${{ steps.pr_meta.outputs.pr_body }}
        run: |
          python3 - <<'PYEOF'
          import json
          import os
          import sys
          import urllib.request
          import urllib.error

          api_key = os.environ["ANTHROPIC_API_KEY"]
          pr_title = os.environ.get("PR_TITLE", "(no title)")
          pr_url = os.environ.get("PR_URL", "")
          base_ref = os.environ.get("BASE_REF", "")
          head_ref = os.environ.get("HEAD_REF", "")
          pr_author = os.environ.get("PR_AUTHOR", "")
          pr_body = os.environ.get("PR_BODY", "")

          with open("/tmp/pr.diff", "r", errors="replace") as f:
              diff = f.read()

          system_prompt = (
              "You are a senior software engineer performing a pull request review. "
              "You are thorough, constructive, and precise. "
              "You only comment on what is visible in the diff and do not invent issues. "
              "For security findings, be conservative: use 'Potential concern:' when uncertain. "
              "If no obvious security issues are visible, say so clearly. "
              "Always end the review with a disclaimer that this is an automated review and not a substitute "
              "for formal AppSec review or automated scanning tools."
          )

          user_message = f"""Please review the following pull request and return your response in Markdown using exactly these sections:

          ## Summary
          ## Code Review
          ## Security Review
          ## Recommended Next Steps

          ---
          **PR title:** {pr_title}
          **Author:** {pr_author}
          **Base → Head:** {base_ref} → {head_ref}
          **PR URL:** {pr_url}

          **PR description:**
          {pr_body or "(none provided)"}

          ---
          **Diff:**
          ```diff
          {diff}
          ```

          Security review instructions:
          - Flag only issues clearly visible in the diff.
          - Consider hardcoded secrets, risky auth/authz changes, missing input validation,
            unsafe shell execution, SQL injection, path traversal, SSRF, and sensitive data in logs.
          - Do not invent vulnerabilities.
          - If uncertain, prefix with "Potential concern:".
          - If no obvious issues are visible, say so clearly.
          - End with the disclaimer about automated review.
          """

          payload = {
              "model": "claude-sonnet-4-6",
              "max_tokens": 2048,
              "system": system_prompt,
              "messages": [{"role": "user", "content": user_message}],
          }

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps(payload).encode(),
              headers={
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(req, timeout=120) as resp:
                  body = json.loads(resp.read().decode())
          except urllib.error.HTTPError as e:
              err_body = e.read().decode()
              print(f"Anthropic API error {e.code}: {err_body}", file=sys.stderr)
              sys.exit(1)
          except Exception as e:
              print(f"Unexpected Anthropic API error: {e}", file=sys.stderr)
              sys.exit(1)

          review_text = "\n".join(
              block["text"]
              for block in body.get("content", [])
              if block.get("type") == "text"
          ).strip()

          if not review_text:
              review_text = (
                  "## Summary\n"
                  "Claude returned an empty review.\n\n"
                  "## Code Review\n"
                  "- No review content returned.\n\n"
                  "## Security Review\n"
                  "- No security review content returned.\n\n"
                  "## Recommended Next Steps\n"
                  "- Re-run the workflow and inspect the API response.\n\n"
                  "_Automated review; not a substitute for formal AppSec review or automated scanning tools._"
              )

          with open("/tmp/review.md", "w") as f:
              f.write(review_text + "\n")

          print("Review written to /tmp/review.md")
          print(f"Input tokens: {body.get('usage', {}).get('input_tokens', 'n/a')}")
          print(f"Output tokens: {body.get('usage', {}).get('output_tokens', 'n/a')}")
          PYEOF

      - name: Post Claude review as PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
          PR_URL: ${{ steps.pr_meta.outputs.pr_url }}
        run: |
          cat > /tmp/comment_header.md <<EOF
          ### 🤖 Claude Automated Review
          > Triggered by @${{ github.event.comment.user.login }} on [this PR](${PR_URL}).
          > Model: \`claude-sonnet-4-6\` — $(date -u '+%Y-%m-%d %H:%M UTC')

          EOF

          cat /tmp/comment_header.md /tmp/review.md > /tmp/comment_body.md

          jq -n --rawfile body /tmp/comment_body.md '{body: $body}' > /tmp/comment.json

          gh api \
            --method POST \
            "repos/${REPO}/issues/${ISSUE}/comments" \
            --input /tmp/comment.json

      - name: Post failure notice on error
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          gh api \
            --method POST \
            "repos/${REPO}/issues/${ISSUE}/comments" \
            --field body="❌ **Claude review failed.** Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
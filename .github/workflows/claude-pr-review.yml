name: Claude PR Review

# Trigger: fires whenever a new comment is created on any issue or pull request.
# We'll filter down to PR-only comments that contain "@claude review" in the job step.
on:
  issue_comment:
    types: [created]

# Minimal permissions: read PR content, write comments back.
permissions:
  contents: read
  pull-requests: write
  issues: write        # needed to post the reply comment via issues API

jobs:
  claude-review:
    name: Run Claude code + security review
    runs-on: ubuntu-latest

    # Guard 1 — only run on pull request comments (not plain issue comments).
    # Guard 2 — only run when the comment body contains "@claude review".
    # Guard 3 — ignore comments from bots so the workflow doesn't trigger on its own reply.
    if: >-
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@claude review') &&
      github.event.comment.user.type != 'Bot'

    steps:
      # ── 1. Acknowledge the request ──────────────────────────────────────────
      # Post a quick "working on it" reply so the reviewer knows the bot saw them.
      - name: Post acknowledgement comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          ISSUE:    ${{ github.event.issue.number }}
        run: |
          gh api \
            --method POST \
            "repos/${REPO}/issues/${ISSUE}/comments" \
            --field body="🤖 **Claude review in progress...** I'll post results shortly."

      # ── 2. Fetch PR metadata ─────────────────────────────────────────────────
      # Use the built-in GitHub token + gh CLI to pull structured PR JSON.
      # We store the PR number, title, base/head refs, and the HTML URL for context.
      - name: Fetch PR metadata
        id: pr_meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          PR_NUM:   ${{ github.event.issue.number }}
        run: |
          PR_JSON=$(gh api "repos/${REPO}/pulls/${PR_NUM}")
          echo "pr_title=$(echo "$PR_JSON"   | jq -r '.title')"          >> "$GITHUB_OUTPUT"
          echo "pr_url=$(echo "$PR_JSON"     | jq -r '.html_url')"       >> "$GITHUB_OUTPUT"
          echo "base_ref=$(echo "$PR_JSON"   | jq -r '.base.ref')"       >> "$GITHUB_OUTPUT"
          echo "head_ref=$(echo "$PR_JSON"   | jq -r '.head.ref')"       >> "$GITHUB_OUTPUT"
          echo "author=$(echo "$PR_JSON"     | jq -r '.user.login')"     >> "$GITHUB_OUTPUT"
          echo "pr_body=$(echo "$PR_JSON"    | jq -r '.body // ""')"     >> "$GITHUB_OUTPUT"

      # ── 3. Fetch the diff ────────────────────────────────────────────────────
      # Request the diff media type. We cap it at ~60 KB before sending to Claude
      # to avoid hitting the API context limit on very large PRs.
      - name: Fetch PR diff
        id: pr_diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          PR_NUM:   ${{ github.event.issue.number }}
        run: |
          gh api \
            --header "Accept: application/vnd.github.diff" \
            "repos/${REPO}/pulls/${PR_NUM}" > /tmp/pr.diff.full

          # Truncate to 60 000 bytes to keep the Claude payload manageable.
          head -c 60000 /tmp/pr.diff.full > /tmp/pr.diff

          ORIG_LEN=$(wc -c < /tmp/pr.diff.full)
          TRUNC_LEN=$(wc -c < /tmp/pr.diff)

          # Append a note if we had to truncate — no unindented bare [ needed.
          if [ "$ORIG_LEN" -gt "$TRUNC_LEN" ]; then
            printf '\n\n[diff truncated at 60,000 bytes — %s bytes in full diff]\n' \
              "$ORIG_LEN" >> /tmp/pr.diff
          fi

          echo "diff_len=${TRUNC_LEN}" >> "$GITHUB_OUTPUT"

      # ── 4. Call the Anthropic Messages API ──────────────────────────────────
      # Python is available on ubuntu-latest. We use only the stdlib + urllib so
      # we don't need a pip install step. The diff is read from the temp file
      # written in the previous step.
      - name: Call Claude API and capture review
        id: claude_review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE:  ${{ steps.pr_meta.outputs.pr_title }}
          PR_URL:    ${{ steps.pr_meta.outputs.pr_url }}
          BASE_REF:  ${{ steps.pr_meta.outputs.base_ref }}
          HEAD_REF:  ${{ steps.pr_meta.outputs.head_ref }}
          PR_AUTHOR: ${{ steps.pr_meta.outputs.author }}
          PR_BODY:   ${{ steps.pr_meta.outputs.pr_body }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request, urllib.error, sys

          api_key   = os.environ["ANTHROPIC_API_KEY"]
          pr_title  = os.environ.get("PR_TITLE",  "(no title)")
          pr_url    = os.environ.get("PR_URL",    "")
          base_ref  = os.environ.get("BASE_REF",  "")
          head_ref  = os.environ.get("HEAD_REF",  "")
          pr_author = os.environ.get("PR_AUTHOR", "")
          pr_body   = os.environ.get("PR_BODY",   "")

          with open("/tmp/pr.diff", "r", errors="replace") as f:
              diff = f.read()

          system_prompt = (
              "You are a senior software engineer performing a pull request review. "
              "You are thorough, constructive, and precise. "
              "You only comment on what is visible in the diff — you do not invent issues. "
              "For security findings you are conservative: use 'Potential concern' when uncertain, "
              "and explicitly state 'No obvious security issues found in this diff' when that is true. "
              "Always end your review with a disclaimer that this is an automated review and is not a "
              "substitute for formal AppSec review or automated scanning tools."
          )

          user_message = f"""Please review the following pull request and return your response in Markdown
          using exactly these four sections:

          ## Summary
          ## Code Review
          ## Security Review
          ## Recommended Next Steps

          ---
          **PR title:** {pr_title}
          **Author:** {pr_author}
          **Base → Head:** {base_ref} → {head_ref}
          **PR URL:** {pr_url}

          **PR description:**
          {pr_body or "(none provided)"}

          ---
          **Diff:**
          ```diff
          {diff}
          ```

          Security review instructions:
          - Flag only issues clearly visible in the diff (hardcoded secrets, risky auth/authz changes,
            missing input validation, unsafe shell execution, SQL injection, path traversal, SSRF,
            sensitive data in logs).
          - Do not invent vulnerabilities.
          - If uncertain, prefix with "Potential concern:".
          - If no obvious issues, say so clearly.
          - End with the disclaimer about automated review.
          """

          payload = {
              "model": "claude-sonnet-4-6",
              "max_tokens": 2048,
              "system": system_prompt,
              "messages": [{"role": "user", "content": user_message}],
          }

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps(payload).encode(),
              headers={
                  "x-api-key":         api_key,
                  "anthropic-version": "2023-06-01",
                  "content-type":      "application/json",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(req, timeout=120) as resp:
                  body = json.loads(resp.read().decode())
          except urllib.error.HTTPError as e:
              err_body = e.read().decode()
              print(f"Anthropic API error {e.code}: {err_body}", file=sys.stderr)
              sys.exit(1)

          # Extract all text blocks from the response.
          review_text = "\n".join(
              block["text"]
              for block in body.get("content", [])
              if block.get("type") == "text"
          )

          # Write to file; GITHUB_OUTPUT multiline values need a delimiter.
          with open("/tmp/review.md", "w") as f:
              f.write(review_text)

          print("Review written to /tmp/review.md")
          print(f"Input tokens:  {body.get('usage', {}).get('input_tokens', 'n/a')}")
          print(f"Output tokens: {body.get('usage', {}).get('output_tokens', 'n/a')}")
          PYEOF

      # ── 5. Post the review as a PR comment ──────────────────────────────────
      # Read the review from the temp file and post it via the GitHub Issues API.
      # We prepend a small header so readers know the comment is automated.
      - name: Post Claude review as PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          ISSUE:    ${{ github.event.issue.number }}
          PR_URL:   ${{ steps.pr_meta.outputs.pr_url }}
        run: |
          HEADER="### 🤖 Claude Automated Review
          > Triggered by @${{ github.event.comment.user.login }} on [this PR](${PR_URL}).
          > Model: \`claude-sonnet-4-6\` — $(date -u '+%Y-%m-%d %H:%M UTC')

          "
          REVIEW=$(cat /tmp/review.md)
          BODY="${HEADER}${REVIEW}"

          # Write the combined body to a file to avoid shell quoting issues.
          echo "$BODY" > /tmp/comment_body.md

          gh api \
            --method POST \
            "repos/${REPO}/issues/${ISSUE}/comments" \
            --field "body=$(cat /tmp/comment_body.md)"

      # ── 6. Handle failures gracefully ────────────────────────────────────────
      # If any earlier step failed, post an error comment so the reviewer isn't
      # left wondering what happened.
      - name: Post failure notice on error
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          ISSUE:    ${{ github.event.issue.number }}
        run: |
          gh api \
            --method POST \
            "repos/${REPO}/issues/${ISSUE}/comments" \
            --field body="❌ **Claude review failed.** Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
